<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SRED.ca — V/TO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!--
    Standalone printable V/TO. Fonts + palette mirror the reportlab-based
    sred-doc-creator skill so the printed PDF and the skill's output look
    like they came from the same generator.

    Palette (locked in):
      SRED_DARK_BLUE   #2F2A4F    headers, primary text
      SRED_GREEN       #B7DB41    accent bars + fills ONLY — never text
      SRED_LIGHT_BLUE  #40BAEB    sub-headers, links
      SRED_EMERALD     #35B586    readable green text (positive callouts)
      SRED_GRAY        #4A4A4A    body text
      SRED_LIGHT_GRAY  #E4E4E4    dividers, borders
  -->
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-blue:  #2F2A4F;
      --green:      #B7DB41;
      --light-blue: #40BAEB;
      --emerald:    #35B586;
      --gray:       #4A4A4A;
      --light-gray: #E4E4E4;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'Lato', -apple-system, system-ui, sans-serif;
      color: var(--gray);
      background: #fafafa;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .toolbar {
      position: sticky; top: 0; z-index: 10;
      background: var(--dark-blue);
      color: white;
      padding: 10px 18px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .toolbar-title { font-family: 'Anton', sans-serif; letter-spacing: 0.05em; font-size: 16px; text-transform: uppercase; }
    .toolbar-actions button {
      background: var(--green); color: var(--dark-blue); border: none;
      padding: 8px 16px; font-family: 'Lato', sans-serif; font-weight: 700;
      font-size: 13px; cursor: pointer; border-radius: 4px; margin-left: 8px;
    }
    .toolbar-actions button.secondary {
      background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4);
    }
    .toolbar-actions button:hover { filter: brightness(1.05); }

    .page {
      max-width: 8.5in;
      margin: 20px auto;
      background: white;
      padding: 0.75in;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      position: relative;
      min-height: 11in;
    }
    .page + .page { margin-top: 20px; }
    .page::before {
      /* top accent bar — SRED_GREEN */
      content: "";
      position: absolute; top: 0; left: 0; right: 0;
      height: 8px; background: var(--green);
    }
    .page-footer {
      position: absolute; bottom: 0.4in; left: 0.75in; right: 0.75in;
      display: flex; justify-content: space-between;
      font-family: 'Lato', sans-serif; font-size: 9px; color: #8a8a8a;
      border-top: 1px solid var(--light-gray);
      padding-top: 8px;
    }

    h1.cover-title {
      font-family: 'Anton', sans-serif;
      font-weight: 400;
      font-size: 56px;
      color: var(--dark-blue);
      line-height: 1;
      margin: 1.5in 0 16px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .cover-subtitle {
      font-family: 'Lato', sans-serif; font-weight: 300;
      font-size: 18px; color: var(--gray); margin: 0 0 4px;
    }
    .cover-meta {
      font-family: 'Lato', sans-serif; font-weight: 400;
      font-size: 12px; color: #8a8a8a; margin: 0;
    }
    .cover-accent {
      height: 4px; background: var(--green); width: 80px; margin: 24px 0;
    }

    h2.section {
      font-family: 'Anton', sans-serif; font-weight: 400;
      font-size: 24px; color: var(--dark-blue);
      letter-spacing: 0.04em; text-transform: uppercase;
      margin: 32px 0 4px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--green);
    }
    h3.subsection {
      font-family: 'Lato', sans-serif; font-weight: 700;
      font-size: 13px; color: var(--dark-blue);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 20px 0 8px;
    }
    p.body {
      font-family: 'Lato', sans-serif; font-weight: 400;
      font-size: 11px; line-height: 1.55;
      color: var(--gray);
      margin: 6px 0;
      white-space: pre-wrap;
    }
    .section-intro {
      font-family: 'Lato', sans-serif; font-weight: 300;
      font-size: 11px; color: #8a8a8a; margin: 4px 0 12px; font-style: italic;
    }
    .value-list, .bullet-list, .goal-list {
      padding-left: 18px; margin: 8px 0;
    }
    .value-list li, .bullet-list li, .goal-list li {
      font-family: 'Lato', sans-serif; font-size: 11px; line-height: 1.6;
      color: var(--gray); margin: 4px 0;
    }
    .value-list li strong { color: var(--dark-blue); font-weight: 700; }
    .goal-list li strong { color: var(--dark-blue); font-weight: 700; margin-right: 6px; }
    .uniques {
      padding-left: 18px; margin: 8px 0;
      counter-reset: unique-counter;
    }
    .uniques li {
      font-family: 'Lato', sans-serif; font-size: 11px; line-height: 1.5;
      color: var(--gray); margin: 6px 0;
    }

    .kv-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px;
      margin: 10px 0; padding: 14px 16px;
      background: #f7f8fa; border-left: 4px solid var(--light-blue);
    }
    .kv-grid .k { font-family: 'Lato', sans-serif; font-weight: 700; font-size: 10px; color: var(--dark-blue); text-transform: uppercase; letter-spacing: 0.06em; }
    .kv-grid .v { font-family: 'Lato', sans-serif; font-weight: 400; font-size: 13px; color: var(--gray); text-align: right; }

    .measurables-table { width: 100%; border-collapse: collapse; margin: 8px 0; }
    .measurables-table th {
      font-family: 'Lato', sans-serif; font-weight: 700; font-size: 9px;
      color: white; background: var(--dark-blue);
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 8px 12px; text-align: left;
    }
    .measurables-table th:last-child { text-align: right; }
    .measurables-table td {
      font-family: 'Lato', sans-serif; font-size: 11px; color: var(--gray);
      padding: 7px 12px; border-bottom: 1px solid var(--light-gray);
    }
    .measurables-table td:last-child { text-align: right; font-weight: 700; color: var(--dark-blue); }
    .measurables-table tr:nth-child(even) td { background: #f9fafb; }

    .banner {
      background: var(--dark-blue); color: white;
      padding: 14px 18px; margin: 14px 0;
      border-radius: 4px;
    }
    .banner .banner-line {
      font-family: 'Anton', sans-serif; letter-spacing: 0.04em;
      font-size: 18px; text-transform: uppercase;
    }
    .banner .banner-sub {
      font-family: 'Lato', sans-serif; font-size: 11px; color: #c8c6db;
      margin-top: 4px;
    }

    .owner-tag {
      display: inline-block; background: rgba(64,186,235,0.12); color: var(--light-blue);
      font-family: 'Lato', sans-serif; font-weight: 700; font-size: 10px;
      padding: 2px 8px; border-radius: 10px; margin-left: 6px;
    }

    .loading, .error {
      max-width: 8.5in; margin: 40px auto; padding: 20px;
      font-family: 'Lato', sans-serif; text-align: center;
    }
    .error { color: #c53030; }

    /* Print-specific tweaks */
    @media print {
      html, body { background: white; }
      .toolbar { display: none; }
      .page { box-shadow: none; margin: 0; max-width: 100%; }
      .page + .page { page-break-before: always; margin-top: 0; }
      @page { size: letter; margin: 0; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="toolbar-title">SRED.ca V/TO</div>
    <div class="toolbar-actions">
      <button class="secondary" onclick="window.close()">Close</button>
      <button onclick="window.print()">Print / Save as PDF</button>
    </div>
  </div>

  <div id="root">
    <div class="loading">Loading V/TO…</div>
  </div>

  <script>
    // Small escape helper for any user-entered strings.
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function fmtDate(d) {
      if (!d) return '—';
      const s = String(d).slice(0, 10);
      const [y, m, day] = s.split('-').map(Number);
      if (!y) return '—';
      return new Date(y, m - 1, day).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }
    function todayLong() {
      return new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    // Renders one measurables block. Returns HTML string.
    function renderMeasurables(measurables) {
      if (!measurables || !measurables.length) return '';
      const rows = measurables.map(m => `
        <tr>
          <td>${esc(m.label || '')}</td>
          <td>${esc(m.value || '')}</td>
        </tr>
      `).join('');
      return `
        <table class="measurables-table">
          <thead><tr><th>Measurable</th><th>Target</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function pageFooter(pageNum, total) {
      return `<div class="page-footer"><span>SRED.ca V/TO</span><span>${pageNum} / ${total}</span></div>`;
    }

    // Render the whole doc. Pagination is driven by section groupings,
    // with @media print page-break-before on .page to force a physical
    // page break for each.
    function render(vto, users) {
      const userById = Object.fromEntries((users || []).map(u => [u.id, u]));

      // Page 1: Cover + Core Values + Core Focus
      const coreValues = (vto.core_values && vto.core_values.length)
        ? `<ul class="value-list">${vto.core_values.map(v => `
            <li><strong>${esc(v.label || '')}</strong>${v.description ? ' — ' + esc(v.description) : ''}</li>
          `).join('')}</ul>`
        : '<p class="body"><em>No core values defined yet.</em></p>';

      const p1 = `
        <div class="page">
          <h1 class="cover-title">Vision / Traction<br/>Organizer</h1>
          <div class="cover-accent"></div>
          <p class="cover-subtitle">SRED.ca — Leadership Team</p>
          <p class="cover-meta">Printed ${esc(todayLong())}</p>

          <h2 class="section">Core Values</h2>
          <p class="section-intro">Who we are, how we behave, how we decide.</p>
          ${coreValues}

          <h2 class="section">Core Focus</h2>
          <p class="section-intro">Purpose — the deeper why. Niche — what we do better than anyone.</p>
          <h3 class="subsection">Purpose / Cause / Passion</h3>
          <p class="body">${esc(vto.core_focus_purpose || '—')}</p>
          <h3 class="subsection">Our Niche</h3>
          <p class="body">${esc(vto.core_focus_niche || '—')}</p>

          ${pageFooter(1, 4)}
        </div>
      `;

      // Page 2: 10-Year Target
      const tenYearBanner = vto.ten_year_measurables && vto.ten_year_measurables.length
        ? `
          <div class="banner">
            <div class="banner-line">${vto.ten_year_measurables.map(m => esc(m.value || '')).filter(Boolean).join(' · ')}</div>
            <div class="banner-sub">${vto.ten_year_measurables.map(m => esc(m.label || '')).join(' · ')}</div>
          </div>
        `
        : '';

      const p2 = `
        <div class="page">
          <h2 class="section">10-Year Target</h2>
          <p class="section-intro">Where we're going — the long bet.</p>
          ${tenYearBanner}
          <p class="body">${esc(vto.ten_year_target || '—')}</p>

          ${pageFooter(2, 4)}
        </div>
      `;

      // Page 3: Marketing Strategy (Target Market, 3 Uniques, Proven Process, Guarantee)
      const uniques = (vto.three_uniques && vto.three_uniques.length)
        ? `<ol class="uniques">${vto.three_uniques.map(u => `<li>${esc(u)}</li>`).join('')}</ol>`
        : '<p class="body"><em>—</em></p>';

      const p3 = `
        <div class="page">
          <h2 class="section">Marketing Strategy</h2>
          <p class="section-intro">Who we serve, what makes us different, how we deliver.</p>

          <h3 class="subsection">Target Market / "The List"</h3>
          <p class="body">${esc(vto.target_market || '—')}</p>

          <h3 class="subsection">Three Uniques</h3>
          ${uniques}

          <h3 class="subsection">Proven Process</h3>
          <p class="body">${esc(vto.proven_process || '—')}</p>

          <h3 class="subsection">Guarantee</h3>
          <p class="body">${esc(vto.guarantee || '—')}</p>

          ${pageFooter(3, 4)}
        </div>
      `;

      // Page 4: 3-Year Picture + 1-Year Plan
      const threeKv = `
        <div class="kv-grid">
          <span class="k">Future Date</span><span class="v">${esc(fmtDate(vto.three_year_future_date))}</span>
          <span class="k">Revenue</span><span class="v">${esc(vto.three_year_revenue || '—')}</span>
          <span class="k">Profit</span><span class="v">${esc(vto.three_year_profit || '—')}</span>
        </div>
      `;
      const threeLooks = (vto.three_year_looks_like && vto.three_year_looks_like.length)
        ? `<ul class="bullet-list">${vto.three_year_looks_like.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`
        : '';

      const oneKv = `
        <div class="kv-grid">
          <span class="k">Future Date</span><span class="v">${esc(fmtDate(vto.one_year_future_date))}</span>
          <span class="k">Revenue</span><span class="v">${esc(vto.one_year_revenue || '—')}</span>
          <span class="k">Profit</span><span class="v">${esc(vto.one_year_profit || '—')}</span>
        </div>
      `;
      const oneGoals = (vto.one_year_goals && vto.one_year_goals.length)
        ? `<ol class="goal-list">${vto.one_year_goals.map(g => {
            const owner = g.owner_id && userById[g.owner_id] ? `<span class="owner-tag">${esc(userById[g.owner_id].name)}</span>` : '';
            return `<li>${esc(g.text || '')}${owner}</li>`;
          }).join('')}</ol>`
        : '<p class="body"><em>No goals recorded.</em></p>';

      const p4 = `
        <div class="page">
          <h2 class="section">3-Year Picture</h2>
          ${threeKv}
          ${renderMeasurables(vto.three_year_measurables)}
          ${threeLooks ? '<h3 class="subsection">What Does It Look Like?</h3>' + threeLooks : ''}

          <h2 class="section">1-Year Plan</h2>
          ${oneKv}
          ${renderMeasurables(vto.one_year_measurables)}
          <h3 class="subsection">Goals For The Year</h3>
          ${oneGoals}

          ${pageFooter(4, 4)}
        </div>
      `;

      return p1 + p2 + p3 + p4;
    }

    async function load() {
      const root = document.getElementById('root');
      try {
        const [meRes, vtoRes, usersRes] = await Promise.all([
          fetch('/api/me',    { credentials: 'same-origin' }),
          fetch('/api/vto',   { credentials: 'same-origin' }),
          fetch('/api/users', { credentials: 'same-origin' }),
        ]);
        const me    = (await meRes.json()).data;
        const vto   = (await vtoRes.json()).data;
        const users = (await usersRes.json()).data;

        if (!me) {
          root.innerHTML = '<div class="error">Not signed in. <a href="/auth/google">Sign in with Google</a> and try again.</div>';
          return;
        }
        if (!vto) {
          root.innerHTML = '<div class="error">No V/TO content available.</div>';
          return;
        }

        root.innerHTML = render(vto, users);

        // Auto-print only if opened via the V/TO "Print" button (?auto=1).
        // On direct load (e.g., bookmarked), show the toolbar and let the
        // user choose when to print.
        const params = new URLSearchParams(location.search);
        if (params.get('auto') === '1') {
          // Wait a beat for Google Fonts + layout to settle before firing
          // the print dialog.
          setTimeout(() => window.print(), 500);
        }
      } catch (e) {
        root.innerHTML = `<div class="error">Failed to load V/TO: ${esc(e.message)}</div>`;
      }
    }
    load();
  </script>
</body>
</html>
